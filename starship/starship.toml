# ًں”¸ OS + user
[os]
disabled = false
style = "bg:#d6a85f fg:#1f1b16"
format = "[ $symbol]($style)"

[os.symbols]
Macos = "َ°€µ"
Linux = "َ°Œ½"
Ubuntu = "َ°•ˆ"
Arch = "َ°£‡"
Windows = "îœڈ"
Unknown = "ï„ˆ"

[username]
show_always = true
style_user = "bg:#d6a85f fg:#1f1b16"
style_root = "bg:#d6a85f fg:#7f1d1d"
format = "[ $user]($style)"

# ًں”¸ Hostname (fixed styling)
[hostname]
ssh_only = false
style = "bg:#d6a85f fg:#1f1b16"
format = "[ îœ‘ @$hostname ]($style)"

# ًں”¸ Directory
[directory]
style = "fg:#f5e6c8 bg:#b58900"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
