[git_status]
style = "bg:#3a2f1f"
format = '[[($all_status$ahead_behind )](fg:#d6a85f bg:#3a2f1f)]($style)'

[git_state]
style = "bg:#3a2f1f"
format = '[[ $state( $progress_current/$progress_total) ](fg:#f5e6c8 bg:#3a2f1f)]($style)'

[git_metrics]
disabled = false
added_style = "fg:#b8d68c bg:#3a2f1f"
deleted_style = "fg:#d68c8c bg:#3a2f1f"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

