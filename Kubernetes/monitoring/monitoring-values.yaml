# ============================================
# kube-prometheus-stack — Full Monitoring Setup
# Docker Desktop Local Development
# ============================================
# --- Prometheus ---
prometheus:
  prometheusSpec:
    retention: 72h
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 2Gi
    # Scrape all ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
  service:
    type: NodePort
    nodePort: 30090
# --- Grafana ---
grafana:
  adminPassword: "admin"   # Change this!
  # Disable init-chown-data — fsGroup:472 already handles volume permissions
  initChownData:
    enabled: false
  service:
    type: NodePort
    nodePort: 30300
  # Enable persistence so dashboards survive restarts
  persistence:
    enabled: true
    size: 1Gi
  # Additional dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'grafana-dashboards-kubernetes'
          orgId: 1
          folder: 'Kubernetes Views'
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/grafana-dashboards-kubernetes
  # Community dashboards (dotdc set — best for K8s)
  dashboards:
    grafana-dashboards-kubernetes:
      k8s-views-global:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json
        datasource: Prometheus
      k8s-views-namespaces:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json
        datasource: Prometheus
      k8s-views-nodes:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json
        datasource: Prometheus
      k8s-views-pods:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json
        datasource: Prometheus
      k8s-system-api-server:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
        datasource: Prometheus
      k8s-system-coredns:
        url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json
        datasource: Prometheus
# --- Alertmanager ---
alertmanager:
  service:
    type: NodePort
    nodePort: 30093
# --- Node Exporter (host-level metrics) ---
nodeExporter:
  enabled: true
# --- kube-state-metrics (K8s object metrics) ---
kubeStateMetrics:
  enabled: true
# --- Scrape targets ---
kubelet:
  enabled: true
kubeApiServer:
  enabled: true
kubeControllerManager:
  enabled: true
kubeScheduler:
  enabled: true
kubeProxy:
  enabled: true
kubeEtcd:
  enabled: true
coreDns:
  enabled: true
prometheus-node-exporter:
  hostRootFsMount:
    enabled: false

